<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Illustrations by Owen Haber" />
  <title>Illustration — Owen Haber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=12" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">Owen Haber</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="illustrations.html" class="active">Illustration</a></li>
      <li><a href="github.html">GitHub</a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Illustration</h1>
      <p>A collection of my artwork and visual work.</p>
    </div>

    <div class="container">

      <!-- ── ILLUSTRATION GRID ──────────────────────────────────
           To add an illustration:
           1. Drop the image file into assets/illustrations/
           2. Copy an <figure> block below and update src / alt.
           The masonry grid handles layout automatically.
           ──────────────────────────────────────────────────── -->

      <div class="illustrations-grid" id="illusGrid">

        <figure class="illus-item">
          <!-- <img src="assets/illustrations/piece1.jpg" alt="Description of piece" /> -->
          <div class="illus-placeholder">Image coming soon</div>
        </figure>

        <figure class="illus-item">
          <div class="illus-placeholder" style="aspect-ratio:3/4">Image coming soon</div>
        </figure>

        <figure class="illus-item">
          <div class="illus-placeholder" style="aspect-ratio:1/1">Image coming soon</div>
        </figure>

        <figure class="illus-item">
          <div class="illus-placeholder" style="aspect-ratio:16/9">Image coming soon</div>
        </figure>

        <figure class="illus-item">
          <div class="illus-placeholder" style="aspect-ratio:3/4">Image coming soon</div>
        </figure>

        <!-- Add more figures here -->

      </div>

      <!-- Lightbox overlay (activates on image click) -->
      <div id="lightbox" style="
        display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);
        z-index:200;align-items:center;justify-content:center;cursor:zoom-out;
      " onclick="this.style.display='none'">
        <img id="lightboxImg" src="" alt="" style="max-width:90vw;max-height:90vh;border-radius:8px;" />
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Owen Haber.</p>
  </footer>

  <script src="js/main.js?v=12"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Lightbox for real images
    document.querySelectorAll('.illus-item img').forEach(img => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', e => {
        e.stopPropagation();
        const lb = document.getElementById('lightbox');
        document.getElementById('lightboxImg').src = img.src;
        document.getElementById('lightboxImg').alt = img.alt;
        lb.style.display = 'flex';
      });
    });
  </script>
</body>
</html>
