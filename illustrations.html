<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Illustrations by Owen Haber" />
  <title>Illustration — Owen Haber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">Owen Haber</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="illustrations.html" class="active">Illustration</a></li>
      <li><a href="github.html">GitHub</a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Illustration</h1>
      <p>A collection of my artwork and visual work.</p>
    </div>

    <div class="container">

      <!-- ── // professional ─────────────────────────────────
           Cover pieces in the masonry grid.
           To add one: drop the file in assets/illustrations/
           and copy a <figure> block with an <img src / alt>. -->
      <section class="illus-section">
        <h2>professional</h2>

        <div class="illustrations-grid" id="illusGrid">

          <figure class="illus-item">
            <!-- <img src="assets/illustrations/piece1.jpg" alt="Description of piece" /> -->
            <div class="illus-placeholder">Image coming soon</div>
          </figure>

          <figure class="illus-item">
            <div class="illus-placeholder" style="aspect-ratio:3/4">Image coming soon</div>
          </figure>

          <figure class="illus-item">
            <div class="illus-placeholder" style="aspect-ratio:1/1">Image coming soon</div>
          </figure>

          <figure class="illus-item">
            <div class="illus-placeholder" style="aspect-ratio:16/9">Image coming soon</div>
          </figure>

          <figure class="illus-item">
            <div class="illus-placeholder" style="aspect-ratio:3/4">Image coming soon</div>
          </figure>

          <!-- Add more figures here -->

        </div>
      </section>

      <!-- ── // digital ──────────────────────────────────────
           Horizontal slide deck — arrows cycle the pieces.
           To add: put <img src="assets/illustrations/digital/xx.png" alt="…" />
           tags directly inside .deck-frame (order = slide order). -->
      <section class="illus-section">
        <h2>digital</h2>

        <div class="deck deck-h">
          <div class="deck-frame">
            <img src="assets/illustrations/digital/tomatoes.webp" alt="Digital painting — carton of tomatoes with a neon rim light on a green grid" decoding="async" />
            <img src="assets/illustrations/digital/baja-blast.webp" alt="Digital painting — Mtn Dew Baja Blast can with graffiti splatter" decoding="async" />
            <img src="assets/illustrations/digital/cheesecake.webp" alt="Digital painting — blueberry cheesecake slice on a checkered diner floor" decoding="async" />
            <img src="assets/illustrations/digital/bottle-house.webp" alt="Digital painting — Victorian house inside a bourbon bottle" decoding="async" />
          </div>
          <div class="deck-controls">
            <button class="deck-btn deck-prev" aria-label="Previous slide">&#8592;</button>
            <span class="deck-counter">&mdash; / &mdash;</span>
            <button class="deck-btn deck-next" aria-label="Next slide">&#8594;</button>
          </div>
        </div>
      </section>

      <!-- ── // sketchbook ───────────────────────────────────
           3D rotating wheel of cutout page scans: front page
           largest, the next 2-3 stacked up and back into depth.
           Scroll over the wheel (or use the arrows) to rotate.
           To add: put <img> tags directly inside .deck-frame
           (transparent-background cutouts work best). -->
      <section class="illus-section">
        <h2>sketchbook</h2>

        <div class="deck deck-wheel">
          <div class="deck-frame">
            <img src="assets/illustrations/sketchbook/tomatoe.webp" alt="Sketchbook spread — colored-pencil tomato with hand studies and warm doodles" decoding="async" />
            <img src="assets/illustrations/sketchbook/power.webp" alt="Sketchbook spread — Chainsaw Man's Power and Pochita beside a painted Mandalorian helmet" decoding="async" />
            <img src="assets/illustrations/sketchbook/3d-ladies.webp" alt="Sketchbook spread — two-color figure studies with 3D blocks and code doodles" decoding="async" />
            <img src="assets/illustrations/sketchbook/hippo.webp" alt="Sketchbook spread — hippo drawn on black paper beside lollipop and hibiscus marker studies" decoding="async" />
            <img src="assets/illustrations/sketchbook/onepiece.webp" alt="Sketchbook spread — One Piece fan art of Gear 5 Luffy and Yamato" decoding="async" />
            <img src="assets/illustrations/sketchbook/spaceship.webp" alt="Sketchbook spread — one-point-perspective mech interior with potted plant studies" decoding="async" />
          </div>
          <div class="deck-controls deck-controls-v">
            <button class="deck-btn deck-prev" aria-label="Previous page">&#8593;</button>
            <span class="deck-counter">&mdash; / &mdash;</span>
            <button class="deck-btn deck-next" aria-label="Next page">&#8595;</button>
            <span class="deck-hint">scroll &#8597; &middot; click to zoom</span>
          </div>
        </div>
      </section>

      <!-- Lightbox overlay (activates on image click) -->
      <div id="lightbox" style="
        display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);
        z-index:200;align-items:center;justify-content:center;cursor:zoom-out;
      " onclick="this.style.display='none'">
        <img id="lightboxImg" src="" alt="" style="max-width:90vw;max-height:90vh;border-radius:6px;" />
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Owen Haber.</p>
  </footer>

  <script src="js/main.js?v=20"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Lightbox for real images (grid + digital deck; the wheel
    // has its own fullscreen zoom in main.js)
    document.querySelectorAll('.illus-item img, .deck-h .deck-frame img').forEach(img => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', e => {
        e.stopPropagation();
        const lb = document.getElementById('lightbox');
        document.getElementById('lightboxImg').src = img.src;
        document.getElementById('lightboxImg').alt = img.alt;
        lb.style.display = 'flex';
      });
    });
  </script>
</body>
</html>
